[general]
repo_root = "."
default_budget = 6000
agent = "opencode"

[pruning]
collapse_success_logs = true
keep_imports = true
keep_public_signatures = true
max_log_lines = 200

[semantic]
enabled = true
backend = "onnx"
model = "local-mini-embed"
max_chunks = 64
allow_fallback = true

[graph]
enabled = true
store = ".ctx/graph.db"
index_tests = true
index_docs = true

[mcp]
enabled = true
port = 8765

[security]
local_only = true
remote_upload_enabled = false
anonymous_telemetry_enabled = false
local_stats_enabled = true
audit_include_exclude = true
exclude_sensitive_files = true
sensitive_patterns = [
    ".env",
    "id_rsa",
    ".pem",
    ".key",
    "credentials",
    "secret",
]
ignored_dirs = [
    ".git",
    ".ctx",
    ".venv",
    "venv",
    "env",
    "__pycache__",
    ".pytest_cache",
    ".ruff_cache",
    ".mypy_cache",
    ".tox",
    ".nox",
    ".idea",
    ".vscode",
    ".claude",
    ".superpowers",
    ".eggs",
    "htmlcov",
    "target",
    "node_modules",
    "build",
    "dist",
    "artifacts",
    ".next",
    ".cache",
    "coverage",
]
ignored_files = [
    "*.db",
    "*.sqlite",
    "*.sqlite3",
    "*.pyc",
    "*.pyo",
    "*.pem",
    "*.log",
    ".env",
    "*.env",
    ".coverage",
    ".coverage.*",
    ".DS_Store",
    "Thumbs.db",
    "package-lock.json",
]
